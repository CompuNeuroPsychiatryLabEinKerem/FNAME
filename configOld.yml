INSTRUCTIONS:
    Learning:
      - You will be shown a series of <Num_Of_Stimuli> face**–**name pairs. Each time, you will be shown a single face together with its name. After <Time_Per_Stimulus_Learning> seconds, the image will be replaced by a slider on which you will be asked to rate how well the name fits the face.
    Recall:
      - Now you will be presented each time with a face and three names. Your task is to select the correct name from the three. You will have <Time_Per_Stimulus_Recall> seconds for each trial and <Num_Of_Stimuli> trials overall. 
    Break:
      - Now we'd like to have a break. Choose one of the following topics for a video to watch.
    Delayed_Recall:    
      - "Hello again! This time, you will be presented with a set of three faces and asked three questions: (1) Which of the faces have you previously seen? (<Time_IsFamiliar> seconds) (2) What is the first letter of their name? (<Time_1stLetter> seconds) (3) What is the full first name as shown in the learning phase? (<Time_FullName> seconds)."

