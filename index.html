<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FNAME Task</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-slider-response@1.1.3"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <style>
    #skip-container {
      position: fixed; top: 14px; right: 22px; z-index: 99999; display: none;
    }
    #skip-btn {
      background: #e67e22; color: #fff; font-size: 17px; font-weight: bold;
      padding: 13px 32px; border: none; border-radius: 8px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.4); letter-spacing: .5px;
    }
    #skip-btn:hover { background: #ca6f1e; }
    .face-img       { width:200px; height:250px; object-fit:cover; border-radius:8px;
                      display:block; margin:0 auto 14px; transition: filter 0.3s; }
    .face-img-large { width:170px; height:210px; object-fit:cover; border-radius:8px;
                      transition: filter 0.3s; }
    .face-img-small { width:130px; height:160px; object-fit:cover; border-radius:8px;
                      display:block; margin:0 auto 14px; transition: filter 0.3s; }
    .face-blurred   { filter: blur(20px) brightness(0.7); }
    /* ── Alphabet keyboard (Delayed Recall Q2) ──────────────────────── */
    .fname-keyboard  { margin-top: 16px; }
    .fname-kb-row    { display:flex; justify-content:center; gap:8px; margin:4px 0; }
    .fname-key {
      width:48px; height:48px; font-size:17px; font-weight:bold;
      border:2px solid #999; border-radius:6px; background:#fff;
      cursor:pointer; box-sizing:border-box;
    }
    .fname-key:hover    { background:#dce8ff; border-color:#4a90e2; }
    .fname-key.selected { background:#4a90e2; color:#fff; border-color:#2c6db5; }
  </style>
</head>

<body>
  <div id="skip-container">
    <button id="skip-btn">&#9197; Skip Stage</button>
  </div>
</body>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   STATIC CONSTANTS  (independent of config.yml)
═══════════════════════════════════════════════════════════════════════ */
const KEYBOARDS = {
  Querty:     { keys: 'QWERTYUIOPASDFGHJKLZXCVBNM'.split(''), rowSize: 10, btnW: 44 },
  ThreeLines: { keys: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''), rowSize:  9, btnW: 44 },
  OneLine:    { keys: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''), rowSize: 26, btnW: 36 }
};

/* ═══════════════════════════════════════════════════════════════════════
   CONFIG BUILDER  – maps the parsed YAML tree → the flat CFG object
   used throughout the experiment.
═══════════════════════════════════════════════════════════════════════ */
function buildCFG(y, presetName) {
  const parseList = v =>
    Array.isArray(v) ? v.map(s => String(s).trim())
                     : String(v).split(',').map(s => s.trim());

  const co   = y.CONFIG;
  const data = y.DATA;

  // Name sets  (A / B / C)
  const names = {};
  for (const [k, v] of Object.entries(data.Name_Sets)) {
    names[k] = { F: parseList(v.F), M: parseList(v.M) };
  }
  const nameSetKeys = Object.keys(names);

  // Name triplets
  const triplets = {};
  for (const [name, val] of Object.entries(data.Name_Triplets)) {
    triplets[name] = parseList(val);
  }

  // Break instruction + word game config
  const rawBreak = y.INSTRUCTIONS && y.INSTRUCTIONS.Break;
  const breakInstruction = Array.isArray(rawBreak) ? rawBreak[0] : (rawBreak || '');
  const rawInhibBreak = y.INSTRUCTIONS && y.INSTRUCTIONS.Inhibition_Break;
  const inhibitionBreakIntro = Array.isArray(rawInhibBreak) ? rawInhibBreak[0]
    : (rawInhibBreak || 'Before the next phase, we\'ll play a quick card game — two short rounds. Instructions will follow on the next screen.');
  const bg = (co.Break_Game) || {};
  const gameRounds         = bg.Num_Rounds        ?? 2;
  const gameStartScore     = bg.Start_Score       ?? 20;
  const gameQuestionCost   = bg.Question_Cost     ?? 1;
  const gameHintCost       = bg.Hint_Cost         ?? 5;
  const gameWrongGuessCost = bg.Wrong_Guess_Cost  ?? 3;

  // ── Apply preset overrides if a preset was selected ──
  let resolvedNameSet = co.Stimuli.Name_Set;
  let numStimuli      = co.Stimuli.Num_Of_Stimuli;
  let nLearningRounds = co.Learning_Phase.Num_Learning_Rounds;
  let studySec        = co.Learning_Phase.Time_Per_Stimulus_Learning;
  let recallSec       = co.Learning_Phase.Time_Per_Stimulus_Recall;
  let nDRRounds       = co.DelayedRecall_Phase.Num_Rounds;
  let drFamiliarSec   = co.DelayedRecall_Phase.Time_IsFamiliar;
  let dr1stLetterSec  = co.DelayedRecall_Phase.Time_1stLetter;
  let drFullNameSec   = co.DelayedRecall_Phase.Time_FullName;

  if (presetName && y.PRESETS && y.PRESETS[presetName]) {
    const p = y.PRESETS[presetName];
    if (p.Name_Set !== undefined)                resolvedNameSet = p.Name_Set;
    if (p.Num_Of_Stimuli !== undefined)          numStimuli      = p.Num_Of_Stimuli;
    if (p.Num_Learning_Rounds !== undefined)     nLearningRounds = p.Num_Learning_Rounds;
    if (p.Time_Per_Stimulus_Learning !== undefined) studySec     = p.Time_Per_Stimulus_Learning;
    if (p.Time_Per_Stimulus_Recall !== undefined)   recallSec    = p.Time_Per_Stimulus_Recall;
    if (p.Num_DelayedRecall_Rounds !== undefined)   nDRRounds    = p.Num_DelayedRecall_Rounds;
    if (p.Time_IsFamiliar !== undefined)         drFamiliarSec   = p.Time_IsFamiliar;
    if (p.Time_1stLetter !== undefined)          dr1stLetterSec  = p.Time_1stLetter;
    if (p.Time_FullName !== undefined)           drFullNameSec   = p.Time_FullName;
  }

  // Resolve RANDOM → pick one of the available name sets
  if (String(resolvedNameSet).toUpperCase() === 'RANDOM') {
    resolvedNameSet = nameSetKeys[Math.floor(Math.random() * nameSetKeys.length)];
  }

  return {
    presetName:       presetName || 'none',
    imgDir:           data.Folder ? data.Folder + '/' : 'images',
    nameSet:          resolvedNameSet,
    numStimuli,
    nLearningRounds,
    studyMs:          studySec * 1000,
    recallMs:         recallSec * 1000,
    nDRRounds,
    drFamiliarMs:     drFamiliarSec * 1000,
    dr1stLetterMs:    dr1stLetterSec * 1000,
    drFullNameMs:     drFullNameSec * 1000,
    showStats:        co.Show_Stats,
    showSkipStage:    co.ShowSkipStage,
    keyboard:         co.Keyboard.Selected,
    breakInstruction,
    inhibitionBreakIntro,
    gameRounds,
    gameStartScore,
    gameQuestionCost,
    gameHintCost,
    gameWrongGuessCost,
    names,
    triplets
  };
}

/* ═══════════════════════════════════════════════════════════════════════
   BLUR HELPER  – after timeout, blur all face images in the current
   trial display but keep the trial alive for a response.
═══════════════════════════════════════════════════════════════════════ */
function blurAfter(trial, ms) {
  const origLoad = trial.on_load;
  const origFinish = trial.on_finish;
  trial.on_load = function () {
    this._blurTimer = setTimeout(() => {
      document.querySelectorAll(
        '.face-img, .face-img-large, .face-img-small'
      ).forEach(img => img.classList.add('face-blurred'));
      // Record that the timer fired
      this._timedOut = true;
    }, ms);
    if (origLoad) origLoad.call(this);
  };
  trial.on_finish = function (d) {
    clearTimeout(this._blurTimer);
    d.timed_out = !!this._timedOut;
    if (origFinish) origFinish.call(this, d);
  };
  // Remove trial_duration so the trial waits for a response
  delete trial.trial_duration;
  return trial;
}

/* ═══════════════════════════════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════════════════════════════ */
(async () => {

  // ── 1. Load config.yml and word vectors in parallel ─────────────────
  let yamlTree;
  try {
    const yamlText = await fetch('config.yml?t=' + Date.now()).then(r => {
      if (!r.ok) throw new Error(`config.yml: HTTP ${r.status}`);
      return r.text();
    });
    yamlTree = jsyaml.load(yamlText);
  } catch (err) {
    document.body.innerHTML = `
      <p style="color:red;font-family:sans-serif;margin:40px;">
        <b>Could not load required files</b><br>${err}<br><br>
        Make sure the file is served from a web server
        (e.g. <code>python -m http.server</code> in this folder).
      </p>`;
    return;
  }

  // ── 1b. Preset selection (blocking, before jsPsych) ─────────────────
  const presetNames = yamlTree.PRESETS ? Object.keys(yamlTree.PRESETS) : [];
  let chosenPreset = null;

  if (presetNames.length > 0) {
    chosenPreset = await new Promise(resolve => {
      const container = document.createElement('div');
      container.style.cssText =
        'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
        'min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif;';
      container.innerHTML = `
        <h2 style="margin-bottom:8px;">Face–Name Memory Task</h2>
        <p style="font-size:18px;color:#555;margin-bottom:28px;">Select a preset to begin:</p>
        <div id="preset-buttons" style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;"></div>
      `;
      const btnBox = container.querySelector('#preset-buttons');
      for (const name of presetNames) {
        const btn = document.createElement('button');
        btn.textContent = name;
        btn.style.cssText =
          'font-size:20px;padding:14px 38px;border:2px solid #4a90e2;border-radius:8px;' +
          'background:#fff;color:#4a90e2;cursor:pointer;font-weight:600;';
        btn.addEventListener('mouseenter', () => { btn.style.background = '#4a90e2'; btn.style.color = '#fff'; });
        btn.addEventListener('mouseleave', () => { btn.style.background = '#fff'; btn.style.color = '#4a90e2'; });
        btn.addEventListener('click', () => {
          container.remove();
          resolve(name);
        });
        btnBox.appendChild(btn);
      }
      document.body.appendChild(container);
    });
  }

  // ── 1c. Build final CFG with chosen preset ──────────────────────────
  const CFG = buildCFG(yamlTree, chosenPreset);

  // Inhibition scores collected across rounds
  const inhibScores = [];

  // Confetti burst from both sides
  function fireConfetti() {
    if (typeof confetti === 'undefined') return;
    const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc99ff'];
    const end = Date.now() + 2500;
    (function frame() {
      confetti({ particleCount: 4, angle:  60, spread: 60, origin: { x: 0 }, colors });
      confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1 }, colors });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }

  // ── 2. jsPsych init ─────────────────────────────────────────────────
  const jsPsych = initJsPsych({
    on_finish: () => jsPsych.data.get().localSave('csv', 'fname_results.csv')
  });

  // Write resolved config to every row of CSV output
  jsPsych.data.addProperties({
    cfg_preset:          CFG.presetName,
    cfg_name_set:        CFG.nameSet,
    cfg_num_stimuli:     CFG.numStimuli,
    cfg_learning_rounds: CFG.nLearningRounds,
    cfg_study_ms:        CFG.studyMs,
    cfg_recall_ms:       CFG.recallMs,
    cfg_dr_rounds:       CFG.nDRRounds,
    cfg_dr_familiar_ms:  CFG.drFamiliarMs,
    cfg_dr_1stletter_ms: CFG.dr1stLetterMs,
    cfg_dr_fullname_ms:  CFG.drFullNameMs,
    cfg_keyboard:        CFG.keyboard
  });

  // Move skip button inside jsPsych's display element
  const _jsPsychRoot = document.querySelector('.jspsych-display-element') || document.body;
  _jsPsychRoot.appendChild(document.getElementById('skip-container'));

  // ── 3. Shared stimuli ───────────────────────────────────────────────
  const nameSet = CFG.names[CFG.nameSet];
  const nF      = Math.floor(CFG.numStimuli / 2);
  const nM      = CFG.numStimuli - nF;
  const STIMULI = [
    ...jsPsych.randomization.sampleWithoutReplacement(nameSet.F, nF),
    ...jsPsych.randomization.sampleWithoutReplacement(nameSet.M, nM)
  ];

  // ── 4. Skip-stage machinery ─────────────────────────────────────────
  let skipStageFlag = false;
  const skipContainer = document.getElementById('skip-container');
  if (CFG.showSkipStage) skipContainer.style.display = 'block';

  document.getElementById('skip-btn').addEventListener('click', () => {
    skipStageFlag = true;
    try { jsPsych.finishTrial({ skipped: true, rt: null }); } catch (_) {}
  });

  function skippable(trial) {
    const origLoad = trial.on_load;
    trial.on_load = function () {
      if (skipStageFlag) { jsPsych.finishTrial({ skipped: true, rt: null }); return; }
      if (origLoad) origLoad.call(this);
    };
    return trial;
  }

  function stageOf(trials) {
    return {
      timeline: trials,
      on_timeline_start()  { skipStageFlag = false; },
      on_timeline_finish() { skipStageFlag = false; }
    };
  }

  // ── 5. Shared runtime state ─────────────────────────────────────────

  // ── 6. Phase builders ───────────────────────────────────────────────

  function buildLearning(round) {
    const trials = [];
    const order  = jsPsych.randomization.shuffle([...STIMULI]);

    for (const name of order) {
      const img = `${CFG.imgDir}${name}_1.jpeg`;

      // Study screen – unchanged (auto-advances after studyMs)
      trials.push(skippable({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <img class="face-img" src="${img}">
          <p style="font-size:32px;font-weight:bold;text-align:center;">${name}</p>
        `,
        choices: 'NO_KEYS',
        trial_duration: CFG.studyMs,
        data: { phase: 'learning', screen: 'study', round, name }
      }));

      // Slider rating – first round only
      if (round === 1) {
        trials.push(skippable({
          type: jsPsychHtmlSliderResponse,
          stimulus: `
            <img class="face-img face-blurred" src="${img}">
            <p style="font-size:26px;font-weight:bold;text-align:center;">${name}</p>
            <p style="font-size:17px;text-align:center;color:#555;margin-bottom:20px;">
              How well does this name fit the face?</p>
          `,
          labels: ['No Way', 'Meh', 'Perfect'],
          min: -1, max: 1, start: 0, step: 0.01,
          require_movement: true, slider_width: 420,
          data: { phase: 'learning', screen: 'rating', round, name }
        }));
      }
    }
    return trials;
  }

  function buildRecall(round) {
    const trials = [];
    const order  = jsPsych.randomization.shuffle([...STIMULI]);

    for (const name of order) {
      const img        = `${CFG.imgDir}${name}_1.jpeg`;
      const shuffled   = jsPsych.randomization.shuffle([...CFG.triplets[name]]);
      const correctPos = shuffled.indexOf(name);

      const trial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <img class="face-img" src="${img}">
          <p style="font-size:22px;">What is this person's name?</p>
        `,
        choices: shuffled,
        button_html: '<button class="jspsych-btn" style="font-size:20px;padding:12px 28px;">%choice%</button>',
        trial_duration: CFG.recallMs,  // will be removed by blurAfter
        data: {
          phase: 'recall', round, name,
          presented_names: JSON.stringify(shuffled),
          correct_position: correctPos
        },
        on_finish(d) {
          d.response_name = d.response !== null ? shuffled[d.response] : null;
          d.correct       = d.response === correctPos;
        }
      };

      trials.push(skippable(blurAfter(trial, CFG.recallMs)));
    }
    return trials;
  }

  function buildDelayedRecall(round) {
    const trials = [];
    const kb     = KEYBOARDS[CFG.keyboard];
    const order  = jsPsych.randomization.shuffle([...STIMULI]);

    for (const name of order) {
      const suffixes       = jsPsych.randomization.shuffle([1, 2, 3]);
      const faceImages     = suffixes.map(s => `${CFG.imgDir}${name}_${s}.jpeg`);
      const correctFacePos = suffixes.indexOf(1);
      const shuffledNames  = jsPsych.randomization.shuffle([...CFG.triplets[name]]);
      const correctNamePos = shuffledNames.indexOf(name);
      const correctLetter  = name[0].toUpperCase();
      const stimId         = `${name}_r${round}`;

      // Q1 – Which face is familiar?
      const q1Trial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `<p style="font-size:22px;margin-bottom:18px;">
                     Which of these faces have you <b>previously seen</b>?
                   </p>`,
        choices: faceImages.map(img => `<img class="face-img-large" src="${img}">`),
        button_html: '<button class="jspsych-btn" style="padding:8px;background:none;border:3px solid #ccc;border-radius:10px;">%choice%</button>',
        trial_duration: CFG.drFamiliarMs,  // removed by blurAfter
        data: {
          phase: 'delayed_recall', question: 'Q1_familiar',
          round, name, stimulus_id: stimId,
          face_suffix_order: JSON.stringify(suffixes),
          correct_face_position: correctFacePos
        },
        on_finish(d) {
          d.correct = d.response === correctFacePos;
        }
      };
      trials.push(skippable(blurAfter(q1Trial, CFG.drFamiliarMs)));

      // Correct face image – used in Q2 and Q3
      const correctFaceImg = `${CFG.imgDir}${name}_1.jpeg`;

      // Q2 – First letter (keyboard)
      const kbRows = CFG.keyboard === 'ThreeLines'
        ? [ 'ABCDEFGHI'.split(''), 'JKLMNOPQR'.split(''), 'STUVWXYZ'.split('') ]
        : CFG.keyboard === 'OneLine'
        ? [ 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('') ]
        : [ 'QWERTYUIOP'.split(''), 'ASDFGHJKL'.split(''), 'ZXCVBNM'.split('') ];

      const kbHtml = kbRows
        .map(row => `<div class="fname-kb-row">${
          row.map(k => `<button class="fname-key" data-key="${k}">${k}</button>`).join('')
        }</div>`)
        .join('');

      const q2Trial = {
        type: jsPsychHtmlKeyboardResponse,
        choices: 'NO_KEYS',
        stimulus: `
          <img class="face-img-small" src="${correctFaceImg}">
          <p style="font-size:22px;">What is the <b>first letter</b> of this person's name?</p>
          <div class="fname-keyboard">${kbHtml}</div>
        `,
        trial_duration: CFG.dr1stLetterMs,  // removed by blurAfter
        data: {
          phase: 'delayed_recall', question: 'Q2_first_letter',
          round, name, stimulus_id: stimId, correct_letter: correctLetter
        },
        on_load() {
          document.querySelectorAll('.fname-key').forEach(btn => {
            btn.addEventListener('click', () => {
              document.querySelectorAll('.fname-key').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
              jsPsych.finishTrial({ response_letter: btn.dataset.key });
            });
          });
        },
        on_finish(d) {
          if (!d.response_letter) d.response_letter = null;
          d.correct = d.response_letter === correctLetter;
        }
      };
      if (CFG.dr1stLetterMs > 0) trials.push(skippable(blurAfter(q2Trial, CFG.dr1stLetterMs)));

      // Q3 – Full name
      const q3Trial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <img class="face-img-small" src="${correctFaceImg}">
          <p style="font-size:22px;">What is this person's <b>full name</b>?</p>
        `,
        choices: shuffledNames,
        button_html: '<button class="jspsych-btn" style="font-size:20px;padding:12px 28px;">%choice%</button>',
        trial_duration: CFG.drFullNameMs,  // removed by blurAfter
        data: {
          phase: 'delayed_recall', question: 'Q3_full_name',
          round, name, stimulus_id: stimId,
          presented_names: JSON.stringify(shuffledNames),
          correct_name_position: correctNamePos, correct_name: name
        },
        on_finish(d) {
          d.response_name = d.response !== null ? shuffledNames[d.response] : null;
          d.correct       = d.response === correctNamePos;
        }
      };
      trials.push(skippable(blurAfter(q3Trial, CFG.drFullNameMs)));
    }
    return trials;
  }

  // ── 6b. Inhibition break (iframe round) ─────────────────────────────
  function buildInhibitionTrial(round) {
    let iframeEl = null;
    return {
      type: jsPsychHtmlKeyboardResponse,
      choices: 'NO_KEYS',
      stimulus: '',
      data: { phase: 'inhibition_break', round },
      on_load() {
        // Hide skip button — game has its own end condition (60 s timer)
        if (skipContainer) skipContainer.style.display = 'none';

        iframeEl = document.createElement('iframe');
        iframeEl.src = round === 1 ? 'Inhibition.html' : 'Inhibition.html?autostart=1';
        iframeEl.style.cssText =
          'position:fixed;inset:0;width:100vw;height:100vh;border:none;z-index:10000;background:#000;';
        document.body.appendChild(iframeEl);

        const handler = e => {
          if (!e.data || e.data.type !== 'inhibitionDone') return;
          window.removeEventListener('message', handler);
          iframeEl.remove(); iframeEl = null;
          inhibScores[round - 1] = e.data.score;   // store for score screens
          if (CFG.showSkipStage && skipContainer) skipContainer.style.display = 'block';
          jsPsych.finishTrial({ phase: 'inhibition_break', round, inhibition_score: e.data.score });
        };
        window.addEventListener('message', handler);
      },
      on_finish() {
        // Safety cleanup if trial is ended externally
        if (iframeEl && iframeEl.parentNode) iframeEl.remove();
      }
    };
  }

  // ── 6c. Inhibition score / transition screens ────────────────────────
  function fmtScore(s) {
    return s !== null && s !== undefined ? s.toFixed(2) + ' Hz' : '— Hz';
  }

  function buildInhibitionScoreScreen(round) {
    return {
      type: jsPsychHtmlKeyboardResponse,
      choices: [' '],
      data: { phase: 'inhibition_break', screen: 'score', round },
      on_load() { fireConfetti(); },
      stimulus() {
        const s1 = inhibScores[0];
        const s2 = inhibScores[1];

        if (round === 1) {
          return `
            <div style="text-align:center;font-family:inherit;max-width:560px;margin:0 auto;">
              <h2 style="font-size:36px;margin-bottom:8px;">Round 1 Complete!</h2>
              <div style="font-size:80px;font-weight:700;color:#f0d060;line-height:1.1;margin:16px 0;">
                ${fmtScore(s1)}
              </div>
              <p style="font-size:14px;color:#888;letter-spacing:1px;margin-bottom:28px;">
                SCORE (1 / T*)
              </p>
              <p style="font-size:20px;color:#1a3f7a;font-weight:600;line-height:1.7;max-width:460px;margin:0 auto 32px;">
                Can you beat your own score?<br>
                Take a few deep breaths — we're going for another one!
              </p>
              <p style="color:#888;font-size:16px;">Press <b>SPACE</b> to start Round 2</p>
            </div>`;
        } else {
          const improved = s1 !== null && s2 !== null
            ? (s2 > s1 ? '🏆 New record!' : s2 === s1 ? 'Exactly equal!' : 'Round 1 still leads…')
            : '';
          return `
            <div style="text-align:center;font-family:inherit;max-width:580px;margin:0 auto;">
              <h2 style="font-size:36px;margin-bottom:24px;">Round 2 Complete!</h2>
              <div style="display:flex;justify-content:center;gap:48px;margin-bottom:12px;">
                <div>
                  <div style="font-size:13px;color:#888;letter-spacing:1px;margin-bottom:6px;">ROUND 1</div>
                  <div style="font-size:60px;font-weight:700;color:#aad4ff;line-height:1;">${fmtScore(s1)}</div>
                </div>
                <div>
                  <div style="font-size:13px;color:#888;letter-spacing:1px;margin-bottom:6px;">ROUND 2</div>
                  <div style="font-size:60px;font-weight:700;color:#f0d060;line-height:1;">${fmtScore(s2)}</div>
                </div>
              </div>
              ${improved ? `<p style="font-size:18px;color:#6bcb77;margin-bottom:20px;">${improved}</p>` : ''}
              <p style="font-size:20px;color:#ccc;line-height:1.7;max-width:460px;margin:24px auto 32px;">
                Now, back to our face recognition game.<br>
                Press SPACE when you're ready.
              </p>
              <p style="color:#888;font-size:16px;">Press <b>SPACE</b> to continue</p>
            </div>`;
        }
      }
    };
  }

  // ── 6d. Word Detective game (kept but no longer in timeline) ─────────
  function buildWordGame(round) {
    const qCost    = CFG.gameQuestionCost;
    const hCost    = CFG.gameHintCost;
    const wCost    = CFG.gameWrongGuessCost;
    const startSc  = CFG.gameStartScore;

    return skippable({
      type: jsPsychHtmlKeyboardResponse,
      choices: 'NO_KEYS',
      stimulus: `
        <div id="wg-wrap" style="max-width:540px;margin:0 auto;text-align:left;">
          <div style="display:flex;align-items:center;background:#f9f9f9;border:1px solid #ddd;
                      border-radius:10px;padding:10px 16px;margin-bottom:10px;">
            <div>
              <span id="wg-score-val" style="font-size:26px;font-weight:bold;color:#e67e22;">${startSc}</span>
              <span style="font-size:13px;color:#888;margin-left:6px;">points remaining</span>
            </div>
            <div style="margin-left:auto;font-size:13px;color:#aaa;">
              Round ${round} of ${CFG.gameRounds}
            </div>
          </div>
          <div style="background:#f9f9f9;border:1px solid #ddd;border-radius:10px;
                      padding:12px 16px;margin-bottom:10px;font-size:16px;text-align:center;color:#555;">
            <span id="wg-hint-text">Preparing…</span>
          </div>
          <div id="wg-history" style="background:#fff;border:1px solid #ddd;border-radius:10px;
                                      padding:10px 14px;margin-bottom:10px;
                                      max-height:200px;overflow-y:auto;min-height:44px;">
            <div id="wg-hist-empty" style="color:#bbb;font-size:13px;font-style:italic;">
              No questions yet — start probing!
            </div>
          </div>
          <div id="wg-result-box" style="display:none;border:2px solid #27ae60;border-radius:10px;
                                         padding:18px;margin-bottom:10px;text-align:center;">
            <div id="wg-result-title" style="font-size:20px;font-weight:bold;margin-bottom:6px;"></div>
            <div id="wg-result-word"  style="font-size:28px;font-weight:bold;color:#4a90e2;margin:8px 0;"></div>
            <div id="wg-result-detail" style="color:#555;font-size:14px;"></div>
            <button id="wg-continue-btn"
              style="margin-top:14px;font-size:15px;padding:10px 26px;background:#4a90e2;
                     color:#fff;border:none;border-radius:8px;cursor:pointer;">
              Continue →
            </button>
          </div>
          <div style="background:#f9f9f9;border:1px solid #ddd;border-radius:10px;
                      padding:12px 16px;margin-bottom:8px;">
            <div style="font-size:11px;font-weight:bold;color:#aaa;text-transform:uppercase;
                        letter-spacing:.5px;margin-bottom:8px;">
              Ask a question <span style="font-weight:normal;">(-${qCost} pt)</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <input id="wg-word-a" placeholder="Word A" autocomplete="off" spellcheck="false"
                style="font-size:15px;padding:7px 10px;border:2px solid #ddd;border-radius:7px;width:130px;">
              <span style="color:#aaa;font-weight:bold;">vs</span>
              <input id="wg-word-b" placeholder="Word B" autocomplete="off" spellcheck="false"
                style="font-size:15px;padding:7px 10px;border:2px solid #ddd;border-radius:7px;width:130px;">
              <button id="wg-ask-btn"
                style="font-size:14px;padding:8px 16px;background:#4a90e2;color:#fff;
                       border:none;border-radius:7px;cursor:pointer;font-weight:600;">Ask</button>
            </div>
            <div id="wg-ask-error" style="font-size:12px;color:#e74c3c;margin-top:4px;min-height:15px;"></div>
          </div>
          <div style="background:#f9f9f9;border:1px solid #ddd;border-radius:10px;padding:12px 16px;">
            <div style="font-size:11px;font-weight:bold;color:#aaa;text-transform:uppercase;
                        letter-spacing:.5px;margin-bottom:8px;">
              Make a guess <span style="font-weight:normal;">(-${wCost} pts if wrong)</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <input id="wg-guess-input" placeholder="Your guess…" autocomplete="off" spellcheck="false"
                style="font-size:15px;padding:7px 10px;border:2px solid #ddd;border-radius:7px;width:170px;">
              <button id="wg-guess-btn"
                style="font-size:14px;padding:8px 16px;background:#e67e22;color:#fff;
                       border:none;border-radius:7px;cursor:pointer;font-weight:600;">Guess!</button>
              <button id="wg-hint-btn"
                style="font-size:14px;padding:8px 16px;background:#8e44ad;color:#fff;
                       border:none;border-radius:7px;cursor:pointer;font-weight:600;">Hint (-${hCost})</button>
            </div>
            <div id="wg-guess-error" style="font-size:12px;color:#e74c3c;margin-top:4px;min-height:15px;"></div>
          </div>
        </div>
      `,
      data: { phase: 'break_game', round },
      on_load() {
        const vecs = wordVectors;
        const pos  = wordPos;
        let score = startSc, questionN = 0, hintsUsed = 0, wrongGuesses = 0, gameOver = false;
        let usedHintStems = new Set();

        function cosine(a, b) {
          let dot = 0, na = 0, nb = 0;
          for (let i = 0; i < a.length; i++) { dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
          return (!na||!nb) ? 0 : dot/(Math.sqrt(na)*Math.sqrt(nb));
        }
        function stem(w) {
          if (w.endsWith('ies'))  return w.slice(0,-3)+'y';
          if (w.endsWith('ing'))  return w.slice(0,-3);
          if (w.endsWith('ed'))   return w.slice(0,-2);
          if (w.endsWith('es'))   return w.slice(0,-2);
          if (w.endsWith('er'))   return w.slice(0,-2);
          if (w.endsWith('est'))  return w.slice(0,-3);
          if (w.endsWith('ly'))   return w.slice(0,-2);
          if (w.endsWith('s'))    return w.slice(0,-1);
          return w;
        }
        function isBaseForm(w) {
          if (w.endsWith('ies') && vecs[w.slice(0,-3)+'y']) return false;
          if (w.endsWith('es')  && vecs[w.slice(0,-2)])     return false;
          if (w.endsWith('s')   && vecs[w.slice(0,-1)])     return false;
          if (w.endsWith('ing') && vecs[w.slice(0,-3)])     return false;
          if (w.endsWith('ing') && vecs[w.slice(0,-3)+'e']) return false;
          if (w.endsWith('ed')  && vecs[w.slice(0,-2)])     return false;
          if (w.endsWith('ed')  && vecs[w.slice(0,-1)])     return false;
          if (w.endsWith('er')  && vecs[w.slice(0,-2)])     return false;
          if (w.endsWith('est') && vecs[w.slice(0,-3)])     return false;
          return true;
        }

        const candidates = Object.keys(vecs).filter(w => w.length>=4 && w.length<=9 && isBaseForm(w) && pos[w]);
        const secretWord = candidates[Math.floor(Math.random()*candidates.length)];
        const secretPos  = pos[secretWord];
        const posLabel   = secretPos === 'adj' ? 'adjective' : secretPos;
        const blanks     = '_ '.repeat(secretWord.length).trim();
        document.getElementById('wg-hint-text').innerHTML =
          `I'm thinking of a <b>${secretWord.length}-letter ${posLabel}</b>: ` +
          `<span style="letter-spacing:6px;font-size:20px;font-weight:bold;color:#4a90e2;">${blanks}</span>`;
        document.getElementById('wg-word-a').focus();

        function deduct(n) {
          score = Math.max(0, score - n);
          const el = document.getElementById('wg-score-val');
          el.textContent = score;
          el.style.color = score <= 5 ? '#e74c3c' : '#e67e22';
          if (score === 0 && !gameOver) endGame(false, true);
        }

        function addRow(html) {
          document.getElementById('wg-hist-empty')?.remove();
          const hist = document.getElementById('wg-history');
          const div  = document.createElement('div');
          div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:13px;';
          div.innerHTML = html;
          hist.appendChild(div);
          hist.scrollTop = hist.scrollHeight;
        }

        function endGame(won, outOfPoints) {
          gameOver = true;
          ['wg-word-a','wg-word-b','wg-ask-btn','wg-guess-input','wg-guess-btn','wg-hint-btn']
            .forEach(id => { document.getElementById(id).disabled = true; });
          const box = document.getElementById('wg-result-box');
          box.style.display  = 'block';
          box.style.borderColor = won ? '#27ae60' : '#e74c3c';
          document.getElementById('wg-result-title').textContent =
            won ? 'You got it!' : outOfPoints ? 'Out of points!' : 'Better luck!';
          document.getElementById('wg-result-word').textContent   = secretWord;
          document.getElementById('wg-result-detail').textContent =
            won ? `${questionN} question${questionN!==1?'s':''}, ${hintsUsed} hint${hintsUsed!==1?'s':''} — ${score} pt${score!==1?'s':''} to spare.`
                : 'The word was above.';
          document.getElementById('wg-continue-btn').addEventListener('click', () => {
            jsPsych.finishTrial({
              secret_word: secretWord, won, score_remaining: score,
              questions_asked: questionN, hints_used: hintsUsed, wrong_guesses: wrongGuesses
            });
          });
        }

        document.getElementById('wg-ask-btn').addEventListener('click', () => {
          const wA  = document.getElementById('wg-word-a').value.trim().toLowerCase();
          const wB  = document.getElementById('wg-word-b').value.trim().toLowerCase();
          const err = document.getElementById('wg-ask-error');
          if (!wA||!wB)  { err.textContent='Enter both words.'; return; }
          if (wA===wB)   { err.textContent='Words must be different.'; return; }
          if (!vecs[wA]) { err.textContent=`"${wA}" not in vocabulary.`; return; }
          if (!vecs[wB]) { err.textContent=`"${wB}" not in vocabulary.`; return; }
          err.textContent = '';
          questionN++;
          const sA = cosine(vecs[secretWord], vecs[wA]);
          const sB = cosine(vecs[secretWord], vecs[wB]);
          const winner = sA>sB ? wA : sB>sA ? wB : null;
          addRow(`<span style="color:#bbb;font-size:11px;">${questionN}.</span>
                  <span style="flex:1;"><b>${wA}</b> vs <b>${wB}</b></span>
                  <span style="color:#aaa;">→</span>
                  ${winner ? `<span style="font-weight:bold;color:#27ae60;">${winner}</span>`
                           : `<span style="color:#aaa;">tie</span>`}
                  <span style="color:#e67e22;font-size:11px;">-${qCost}</span>`);
          document.getElementById('wg-word-a').value = '';
          document.getElementById('wg-word-b').value = '';
          document.getElementById('wg-word-a').focus();
          deduct(qCost);
        });

        document.getElementById('wg-guess-btn').addEventListener('click', () => {
          const guess = document.getElementById('wg-guess-input').value.trim().toLowerCase();
          const err   = document.getElementById('wg-guess-error');
          if (!guess) { err.textContent='Type your guess first.'; return; }
          err.textContent = '';
          if (guess === secretWord) {
            addRow(`<span style="color:#27ae60;font-weight:bold;">✓ "${guess}" — correct!</span>`);
            endGame(true, false);
          } else {
            wrongGuesses++;
            addRow(`<span style="color:#e74c3c;font-weight:bold;">✗ "${guess}" — wrong</span>
                    <span style="color:#e67e22;font-size:11px;">-${wCost}</span>`);
            document.getElementById('wg-guess-input').value = '';
            document.getElementById('wg-guess-input').focus();
            deduct(wCost);
          }
        });

        document.getElementById('wg-hint-btn').addEventListener('click', () => {
          if (gameOver) return;
          const sv   = vecs[secretWord];
          const pool = Object.entries(vecs)
            .filter(([w]) => w !== secretWord)
            .map(([w, v]) => ({ word: w, score: cosine(sv, v) }))
            .sort((a, b) => b.score - a.score)
            .slice(4, 20)
            .filter(({ word: w }) => !usedHintStems.has(stem(w)));
          if (!pool.length) {
            addRow(`<span style="color:#aaa;">No more distinct hints available.</span>`);
            return;
          }
          const hint = pool[Math.floor(Math.random()*pool.length)].word;
          usedHintStems.add(stem(hint));
          hintsUsed++;
          addRow(`<span style="color:#8e44ad;font-weight:bold;">Hint: a close neighbour is "<em>${hint}</em>"</span>
                  <span style="color:#e67e22;font-size:11px;">-${hCost}</span>`);
          deduct(hCost);
        });

        document.getElementById('wg-word-a').addEventListener('keydown', e => {
          if (e.key==='Enter') document.getElementById('wg-word-b').focus();
        });
        document.getElementById('wg-word-b').addEventListener('keydown', e => {
          if (e.key==='Enter') document.getElementById('wg-ask-btn').click();
        });
        document.getElementById('wg-guess-input').addEventListener('keydown', e => {
          if (e.key==='Enter') document.getElementById('wg-guess-btn').click();
        });
      }
    });
  }

  // ── 7. Build timeline ───────────────────────────────────────────────
  const timeline = [];

  // Welcome
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>Face–Name Memory Task</h2>
      <p>Welcome! This task has three parts:</p>
      <ol style="text-align:left;display:inline-block;font-size:18px;line-height:2.2;">
        <li><b>Learning</b> – Study face–name pairs and rate each one.</li>
        <li><b>Recall</b> – See each face; choose the correct name from three options.</li>
        <li><b>Delayed Recall</b> – After a short break, answer three questions per face.</li>
      </ol>
      <p style="color:#888;">Press any key to begin.</p>
    `
  });

  // (Learning + Recall) × nLearningRounds
  for (let r = 1; r <= CFG.nLearningRounds; r++) {

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: r === 1
        ? `<h2>Learning Phase</h2>
           <p>You will be shown <b>${CFG.numStimuli}</b> face–name pairs
              over <b>${CFG.nLearningRounds} rounds</b>.<br>
              Each face appears with its name for <b>${CFG.studyMs / 1000} s</b>,
              then rate how well the name fits.</p>
           <p style="color:#888;">Press any key to begin.</p>`
        : `<p>Learning – Round <b>${r}</b> of ${CFG.nLearningRounds}.</p>
           <p style="color:#888;">Press any key to continue.</p>`
    });
    timeline.push(stageOf(buildLearning(r)));

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: r === 1
        ? `<h2>Recall Phase</h2>
           <p>You will see a face and <b>three name options</b>.<br>
              Select the correct name
              (${CFG.numStimuli} trials).</p>
           <p style="color:#888;">Press any key to begin.</p>`
        : `<p>Recall – Round <b>${r}</b> of ${CFG.nLearningRounds}.</p>
           <p style="color:#888;">Press any key to continue.</p>`
    });
    timeline.push(stageOf(buildRecall(r)));

    if (CFG.showStats) {
      timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus() {
          const d  = jsPsych.data.get().filter({ phase: 'recall', round: r });
          const nC = d.filter({ correct: true }).count();
          const n  = d.count();
          const rt = Math.round(d.select('rt').mean());
          return `
            <h3>Round ${r} Recall Results</h3>
            <p>Correct: <b>${nC} / ${n}</b></p>
            <p>Average response time: <b>${rt} ms</b></p>
            <p style="color:#888;">Press any key to continue.</p>
          `;
        }
      });
    }
  }

  // Break – inhibition game (intro + 2 rounds with score screens)
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>Break — Card Game</h2>
      <p style="font-size:18px;max-width:520px;margin:0 auto 24px;line-height:1.6;">
        ${CFG.inhibitionBreakIntro}
      </p>
      <p style="color:#888;margin-top:28px;">Press any key to continue.</p>
    `,
    data: { phase: 'inhibition_break', screen: 'instructions' }
  });

  timeline.push(buildInhibitionTrial(1));
  timeline.push(buildInhibitionScoreScreen(1));   // score + confetti + "go again"
  timeline.push(buildInhibitionTrial(2));
  timeline.push(buildInhibitionScoreScreen(2));   // both scores + confetti + back to FNAME

  // Delayed Recall (intro absorbed into round-2 score screen; just begin)
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>Delayed Recall</h2>
      <p>Each trial shows <b>three faces</b>. You will be asked:</p>
      <ol style="text-align:left;display:inline-block;font-size:18px;line-height:2.2;">
        <li>Which face have you <b>previously seen</b>?</li>
        ${CFG.dr1stLetterMs > 0 ? `<li>What is the <b>first letter</b> of their name?</li>` : ''}
        <li>What is their <b>full name</b>?</li>
      </ol>
      <p style="color:#888;">Press any key to begin.</p>
    `
  });

  for (let r = 1; r <= CFG.nDRRounds; r++) {
    if (r > 1) {
      timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<p>Delayed Recall – Round <b>${r}</b> of ${CFG.nDRRounds}.</p>
                   <p style="color:#888;">Press any key to continue.</p>`
      });
    }
    timeline.push(stageOf(buildDelayedRecall(r)));
  }

  // End
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus() {
      if (!CFG.showStats) {
        return `<h2>Task Complete!</h2>
                <p style="color:#888;">Press any key to save results as CSV.</p>`;
      }
      const d  = jsPsych.data.get().filter({ phase: 'delayed_recall' });
      const n  = CFG.numStimuli * CFG.nDRRounds;
      const q1 = d.filter({ question: 'Q1_familiar',     correct: true }).count();
      const q2 = d.filter({ question: 'Q2_first_letter', correct: true }).count();
      const q3 = d.filter({ question: 'Q3_full_name',    correct: true }).count();
      const q2Row = CFG.dr1stLetterMs > 0
        ? `<tr><td>First letter:</td><td><b>${q2} / ${n}</b></td></tr>` : '';
      return `
        <h2>Task Complete!</h2>
        <h3 style="margin-top:20px;">Delayed Recall Summary</h3>
        <table style="margin:auto;font-size:20px;border-spacing:28px 10px;">
          <tr><td>Familiar face:</td><td><b>${q1} / ${n}</b></td></tr>
          ${q2Row}
          <tr><td>Full name:</td>    <td><b>${q3} / ${n}</b></td></tr>
        </table>
        <p style="color:#888;margin-top:28px;">Press any key to save results as CSV.</p>
      `;
    }
  });

  // ── 8. Run ──────────────────────────────────────────────────────────
  jsPsych.run(timeline);

})(); // end async IIFE
</script>
</html>
